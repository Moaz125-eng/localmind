services:
  localmind:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./localmind_data:/app/localmind_data
    environment:
      LOCALMIND_DATA_DIR: /app/localmind_data
      LOCALMIND_DATABASE_URL: sqlite+aiosqlite:////app/localmind_data/localmind.db
      LOCALMIND_OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
